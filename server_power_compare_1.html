<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Hero Power Comparison (2241~2252)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      padding: 32px 24px;
      min-height: 100vh;
    }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; color: #1a1a1a; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      max-width: 820px;
      margin: 0 auto 0;
    }
    .lang-toggle {
      display: flex;
      gap: 4px;
      background: #fff;
      border: 0.5px solid #e0ded8;
      border-radius: 8px;
      padding: 3px;
      margin-top: 2px;
    }
    .lang-btn {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .lang-btn.active {
      background: #534AB7;
      color: #fff;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      border: 0.5px solid #e0ded8;
      padding: 24px 28px;
      max-width: 820px;
      margin: 0 auto;
    }
    .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .controls label { font-size: 13px; color: #666; }
    select {
      font-size: 13px; padding: 7px 12px; border-radius: 8px;
      border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; outline: none;
    }
    select:focus { border-color: #534AB7; }
    .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 20px; font-size: 12px; color: #666; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-wrap { position: relative; width: 100%; height: 420px; }
    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 24px; }
    .stat-card { background: #f5f5f3; border-radius: 10px; padding: 12px; text-align: center; }
    .stat-rank { font-size: 11px; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 16px; font-weight: 500; color: #534AB7; margin-bottom: 2px; }
    .stat-pos { font-size: 11px; color: #888; }
    .stat-pos span { color: #534AB7; font-weight: 500; }
    .compare-stats { margin-top: 10px; border-top: 0.5px solid #e0ded8; padding-top: 16px; }
    .compare-title { font-size: 12px; color: #888; margin-bottom: 10px; }
    .compare-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .compare-card {
      background: #fff5f2; border-radius: 10px; padding: 12px;
      text-align: center; border: 0.5px solid #f0c0b0;
    }
    .compare-rank { font-size: 11px; color: #888; margin-bottom: 4px; }
    .compare-value { font-size: 16px; font-weight: 500; color: #D85A30; margin-bottom: 2px; }
    .diff-badge { font-size: 11px; font-weight: 500; padding: 2px 6px; border-radius: 4px; display: inline-block; }
    .diff-up { background: #eaf3de; color: #3B6D11; }
    .diff-down { background: #fcebeb; color: #A32D2D; }
    .diff-eq { background: #f1efe8; color: #5f5e5a; }
  </style>
</head>
<body>
  <div class="top-bar">
    <div>
      <h1 id="titleText"></h1>
      <p class="subtitle" id="subtitleText"></p>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnKo" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn" id="btnEn" onclick="setLang('en')">English</button>
    </div>
  </div>

  <div class="card">
    <div class="controls">
      <label id="selectLabel"></label>
      <select id="serverSelect">
        <option value="all" id="optAll"></option>
        <option value="2241">Server 2241</option>
        <option value="2242">Server 2242</option>
        <option value="2243">Server 2243</option>
        <option value="2244">Server 2244</option>
        <option value="2245">Server 2245</option>
        <option value="2247">Server 2247</option>
        <option value="2248">Server 2248</option>
        <option value="2249">Server 2249</option>
        <option value="2250">Server 2250</option>
        <option value="2251">Server 2251</option>
        <option value="2252">Server 2252</option>
      </select>
    </div>
    <div class="legend" id="legend"></div>
    <div class="chart-wrap">
      <canvas id="rankChart" role="img" aria-label="Hero power comparison by rank across servers"></canvas>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="compare-stats" id="compareStats" style="display:none;">
      <p class="compare-title" id="compareTitle"></p>
      <div class="compare-grid" id="compareGrid"></div>
    </div>
  </div>

  <script>
    const i18n = {
      ko: {
        title: '서버 영웅 전투력 비교',
        subtitle: '서버 2241 ~ 2252 · 순위별 총 영웅 전투력 (단위: M) · 우리 서버: 2246',
        selectLabel: '비교 서버 선택:',
        optAll: '전체 서버 (회색)',
        ourServer: '우리 서버',
        otherServers: '다른 서버들',
        restServers: '나머지 서버들',
        compareServer: '비교 서버',
        ranks: ['10등','20등','50등','100등','200등'],
        rankLabel: (r) => r,
        posLabel: (pos, total) => `${pos}위 / ${total}개 서버`,
        compareTitle: (s) => `서버 ${s} 비교 (▲우리가 높음 / ▼우리가 낮음)`,
        tooltipRank: (r) => `순위: ${r}`,
        tooltipOur: '⭐ 우리 서버',
        tooltipCmp: '🔴 비교 서버',
        serverPrefix: '서버 ',
      },
      en: {
        title: 'Server Hero Power Comparison',
        subtitle: 'Servers 2241 ~ 2252 · Total Hero Power by Rank (Unit: M) · Our Server: 2246',
        selectLabel: 'Compare with:',
        optAll: 'All Servers (gray)',
        ourServer: 'Our Server',
        otherServers: 'Other Servers',
        restServers: 'Rest of Servers',
        compareServer: 'Compare Server',
        ranks: ['Top 10','Top 20','Top 50','Top 100','Top 200'],
        rankLabel: (r) => r,
        posLabel: (pos, total) => `#${pos} of ${total} servers`,
        compareTitle: (s) => `Comparing vs Server ${s} (▲ we're higher / ▼ we're lower)`,
        tooltipRank: (r) => `Rank: ${r}`,
        tooltipOur: '⭐ Our Server',
        tooltipCmp: '🔴 Compare Server',
        serverPrefix: 'Server ',
      }
    };

    let lang = 'ko';
    let myChart = null;

    const serverData = {
      '2241': [34.34, 28.5,  24.46, 21.37, 19.12],
      '2242': [43.6,  35.3,  28.16, 22.94, 18.06],
      '2243': [42.14, 35.4,  29.14, 24.74, 19.79],
      '2244': [37.54, 32.22, 25.06, 21.22, 18.28],
      '2245': [33.61, 28.98, 25.06, 21.79, 18.3],
      '2246': [35.53, 30.9,  25.14, 20.25, 17.0],
      '2247': [30.8,  28.0,  22.83, 20.14, 17.0],
      '2248': [31.91, 27.4,  22.55, 20.1,  17.4],
      '2249': [45.03, 32.99, 27.32, 21.76, 17.1],
      '2250': [33.82, 27.26, 23.38, 20.88, 17.3],
      '2251': [33.25, 27.89, 23.16, 19.53, 16.02],
      '2252': [45.45, 35.9,  26.42, 21.41, 17.7],
    };
    const totalServers = Object.keys(serverData).length;

    function getRankOf2246(ri) {
      const sorted = Object.values(serverData).map(v => v[ri]).sort((a,b) => b-a);
      return sorted.indexOf(serverData['2246'][ri]) + 1;
    }

    const COLOR_2246 = '#534AB7';
    const COLOR_COMPARE = '#D85A30';
    const COLOR_GRAY = 'rgba(180,178,169,0.45)';

    const rankLabelsPlugin = {
      id: 'rankLabels',
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        const t = i18n[lang];
        const idx = chart.data.datasets.findIndex(d => d.label === '2246');
        if (idx < 0) return;
        const meta = chart.getDatasetMeta(idx);
        meta.data.forEach((point, i) => {
          const pos = getRankOf2246(i);
          const label = lang === 'ko' ? `${pos}/${totalServers}위` : `#${pos}/${totalServers}`;
          ctx.save();
          ctx.font = '500 11px -apple-system, sans-serif';
          const tw = ctx.measureText(label).width;
          const pad = 5;
          const bx = point.x - tw/2 - pad;
          const by = point.y - 30;
          ctx.fillStyle = COLOR_2246;
          ctx.beginPath();
          ctx.roundRect(bx, by, tw + pad*2, 17, 4);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(label, point.x, by + 8.5);
          ctx.restore();
        });
      }
    };

    function buildDatasets(selected) {
      const ds = [];
      Object.entries(serverData).forEach(([server, values]) => {
        if (server === '2246') return;
        const isCmp = selected !== 'all' && server === selected;
        ds.push({
          label: server,
          data: values,
          borderColor: isCmp ? COLOR_COMPARE : COLOR_GRAY,
          backgroundColor: 'transparent',
          borderWidth: isCmp ? 2.5 : 1,
          borderDash: isCmp ? [] : [4,3],
          pointBackgroundColor: isCmp ? COLOR_COMPARE : COLOR_GRAY,
          pointRadius: isCmp ? 5 : (selected === 'all' ? 3 : 2),
          pointBorderColor: 'transparent',
          pointBorderWidth: 0,
          tension: 0.3,
          order: isCmp ? 1 : 2,
        });
      });
      ds.push({
        label: '2246',
        data: serverData['2246'],
        borderColor: COLOR_2246,
        backgroundColor: 'transparent',
        borderWidth: 3,
        borderDash: [],
        pointBackgroundColor: COLOR_2246,
        pointRadius: 6,
        pointBorderColor: '#3C3489',
        pointBorderWidth: 2,
        tension: 0.3,
        order: 0,
      });
      return ds;
    }

    function updateLegend(selected) {
      const t = i18n[lang];
      const el = document.getElementById('legend');
      let html = `<span class="legend-item"><span class="legend-dot" style="background:${COLOR_2246};"></span>2246 (${t.ourServer})</span>`;
      if (selected === 'all') {
        html += `<span class="legend-item"><span class="legend-dot" style="background:rgba(180,178,169,0.7);"></span>${t.otherServers}</span>`;
      } else {
        html += `<span class="legend-item"><span class="legend-dot" style="background:${COLOR_COMPARE};"></span>${t.serverPrefix}${selected}</span>`;
        html += `<span class="legend-item"><span class="legend-dot" style="background:rgba(180,178,169,0.4);"></span>${t.restServers}</span>`;
      }
      el.innerHTML = html;
    }

    function updateStats(selected) {
      const t = i18n[lang];
      const grid = document.getElementById('statsGrid');
      grid.innerHTML = t.ranks.map((r, i) => {
        const val = serverData['2246'][i];
        const pos = getRankOf2246(i);
        return `<div class="stat-card">
          <div class="stat-rank">${r}</div>
          <div class="stat-value">${val.toFixed(2)}M</div>
          <div class="stat-pos"><span>${lang === 'ko' ? pos+'위' : '#'+pos}</span> / ${totalServers}${lang === 'ko' ? '개 서버' : ' servers'}</div>
        </div>`;
      }).join('');

      const cmpSection = document.getElementById('compareStats');
      if (selected === 'all') { cmpSection.style.display = 'none'; return; }
      cmpSection.style.display = 'block';
      document.getElementById('compareTitle').textContent = t.compareTitle(selected);
      const cmpGrid = document.getElementById('compareGrid');
      cmpGrid.innerHTML = t.ranks.map((r, i) => {
        const our = serverData['2246'][i];
        const their = serverData[selected][i];
        const diff = our - their;
        const sign = diff > 0 ? '+' : '';
        const cls = diff > 0 ? 'diff-up' : diff < 0 ? 'diff-down' : 'diff-eq';
        const arrow = diff > 0 ? '▲' : diff < 0 ? '▼' : '–';
        return `<div class="compare-card">
          <div class="compare-rank">${r}</div>
          <div class="compare-value">${their.toFixed(2)}M</div>
          <span class="diff-badge ${cls}">${arrow} ${sign}${diff.toFixed(2)}M</span>
        </div>`;
      }).join('');
    }

    function updateStaticTexts() {
      const t = i18n[lang];
      document.getElementById('titleText').textContent = t.title;
      document.getElementById('subtitleText').textContent = t.subtitle;
      document.getElementById('selectLabel').textContent = t.selectLabel;
      document.getElementById('optAll').textContent = t.optAll;
    }

    function renderChart(selected) {
      const t = i18n[lang];
      const datasets = buildDatasets(selected);
      if (myChart) {
        myChart.data.labels = t.ranks;
        myChart.data.datasets = datasets;
        myChart.options.plugins.tooltip.callbacks.title = (items) => t.tooltipRank(items[0].label);
        myChart.options.plugins.tooltip.callbacks.label = (item) => {
          const s = item.dataset.label;
          const sel = document.getElementById('serverSelect').value;
          const tag = s === '2246' ? ` ${t.tooltipOur}` : (sel === s ? ` ${t.tooltipCmp}` : '');
          return ` ${t.serverPrefix}${s}${tag}: ${item.parsed.y.toFixed(2)}M`;
        };
        myChart.update();
      } else {
        myChart = new Chart(document.getElementById('rankChart'), {
          type: 'line',
          data: { labels: t.ranks, datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { top: 32 } },
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  title: (items) => t.tooltipRank(items[0].label),
                  label: (item) => {
                    const s = item.dataset.label;
                    const sel = document.getElementById('serverSelect').value;
                    const tag = s === '2246' ? ` ${t.tooltipOur}` : (sel === s ? ` ${t.tooltipCmp}` : '');
                    return ` ${t.serverPrefix}${s}${tag}: ${item.parsed.y.toFixed(2)}M`;
                  }
                },
                itemSort: (a,b) => b.parsed.y - a.parsed.y,
              }
            },
            scales: {
              x: { ticks: { autoSkip: false }, grid: { color: 'rgba(128,128,128,0.1)' } },
              y: { min: 14, max: 48, ticks: { callback: v => v + 'M' }, grid: { color: 'rgba(128,128,128,0.1)' } }
            }
          },
          plugins: [rankLabelsPlugin]
        });
      }
      updateLegend(selected);
      updateStats(selected);
    }

    function setLang(l) {
      lang = l;
      document.getElementById('btnKo').classList.toggle('active', l === 'ko');
      document.getElementById('btnEn').classList.toggle('active', l === 'en');
      updateStaticTexts();
      const selected = document.getElementById('serverSelect').value;
      renderChart(selected);
    }

    document.getElementById('serverSelect').addEventListener('change', e => {
      renderChart(e.target.value);
    });

    updateStaticTexts();
    renderChart('all');
  </script>
</body>
</html>
